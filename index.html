<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
</head>
<body class="bg-dark d-flex justify-content-center align-items-center min-vh-100">
    <div class="card col-12 col-md-7 col-lg-6">
        <div class="card-body">
            <!--Current Weather Display-->
            <h2 class="text-center">Current Weather</h2>
            <div class="col-12 d-block d-md-flex d-lg-flex align-items-center justify-content-center">
                <div class="mx-5">
                    <h1 class="text-center"><i class="bi bi-geo-alt-fill"></i></h1>
                    <p id="txtLocation" class="text-center">Cookeville,TN</p>
                </div>
                <div class="mx-5">
                    <h4><i class="bi bi-thermometer-half"></i><span class = "ms-4" id="txtTemperature">tmp</span></h4>
                    <h4><i class="bi bi-moisture"></i><span class = "ms-4" id="txtHumidity">humid</span></h4>
                    <h4><i class="bi bi-cloudy-fill"></i><span class = "ms-4" id="txtPrecipitation">precip</span></h4>
                </div>
            </div>

            <!--Hourly Weather Display-->
            <hr>
            <h2 class="text-center">Hourly Weather</h2>

        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.5.0/chart.umd.js" integrity="sha512-D4pL3vNgjkHR/qq+nZywuS6Hg1gwR+UzrdBW6Yg8l26revKyQHMgPq9CLJ2+HHalepS+NuGw1ayCCsGXu9JCXA==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <script src="script/app.js"></script>
</body>
</html>
