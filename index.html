<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <title>Weather App</title>
    <link rel="icon" type="image/x-icon" href="/images/favicon.ico">
    <link rel="apple-touch-icon" href="images/WX.png">
    <link rel="apple-touch-icon" sizes="60x60" href="images/WX.png"">
    <link rel="apple-touch-icon" sizes="114x114" href="images/WX-Watch.png">
    <link rel="apple-touch-icon" sizes="144x144" href="images/WX-Watch.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <meta name="mobile-web-app-capable" content="yes">
    <link rel="manifest" href="manifest.json" />
</head>

<body class="bg-dark d-flex justify-content-center align-items-center min-vh-100">
    <div class="card col-12 col-md-7 col-lg-6">
        <div class="card-body">
            <!--Current Weather Display-->
            <h2 class="text-center">Current Weather</h2>
            <div class="col-12 d-block d-md-flex d-lg-flex align-items-center justify-content-center">
                <div class="mx-5">
                    <h1 class="text-center"><i class="bi bi-geo-alt-fill"></i></h1>
                    <p id="txtLocation" class="text-center">Cookeville,TN</p>
                </div>
                <div class="mx-5">
                    <h4><i class="bi bi-thermometer-half"></i><span class = "ms-4" id="txtTemperature">tmp</span></h4>
                    <h4><i class="bi bi-moisture"></i><span class = "ms-4" id="txtHumidity">humid</span></h4>
                    <h4><i class="bi bi-cloudy-fill"></i><span class = "ms-4" id="txtPrecipitation">precip</span></h4>
                </div>
            </div>

            <!--Hourly Weather Display-->
            <hr>
            <h2 class="text-center">Hourly Weather</h2>

        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.5.0/chart.umd.js" integrity="sha512-D4pL3vNgjkHR/qq+nZywuS6Hg1gwR+UzrdBW6Yg8l26revKyQHMgPq9CLJ2+HHalepS+NuGw1ayCCsGXu9JCXA==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <script src="script/app.js"></script>
</body>
</html>
